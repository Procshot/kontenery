name: Synchronize and deploy PWA

on:
  push:
    branches:
      - main
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Compute Vite base path
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> $GITHUB_ENV
          else
            echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/" >> $GITHUB_ENV
          fi
          echo "Using VITE_BASE_PATH=$VITE_BASE_PATH"

      - name: Synchronize container data
        run: npm run sync:data -- --refresh

      - name: Validate generated data
        run: npm run validate:data

      - name: Run tests
        run: npm test

      - name: Build PWA
        run: npm run build

      - name: Verify built app
        run: |
          test -f dist/index.html
          ! grep -q "/src/main.tsx" dist/index.html
          ! grep -q "%BASE_URL%" dist/index.html
          ls -la dist
          find dist -maxdepth 2 -type f | sort | head -80

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4